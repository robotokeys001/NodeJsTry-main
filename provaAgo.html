<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Gauge Auto-Update</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f0f2f5;
            font-family: sans-serif;
        }

        /* Contenitore Semicerchio */
        .gauge {
            position: relative;
            width: 300px;
            height: 150px;
            background: #ddd;
            border-radius: 150px 150px 0 0;
            overflow: hidden;
            border-bottom: 2px solid #333;
        }

        /* L'ago */
        #needle {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 4px;
            height: 130px;
            background: #ff4757;
            margin-left: -2px; /* Centratura */
            transform-origin: bottom center;
            transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        /* Perno centrale */
        .center-node {
            position: absolute;
            bottom: -10px;
            left: 50%;
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 11;
        }

        #label {
            font-size: 2.5rem;
            font-weight: bold;
            margin-top: 10px;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="gauge">
        <div id="needle"></div>
        <div class="center-node"></div>
    </div>
    <div id="label">0</div>

    <script>
        let gaugeInterval = null;
        const needle = document.getElementById('needle');
        const label = document.getElementById('label');

        function updateGauge(value) {
            const min = 0;
            const max = 100;
            
            // Limitiamo il valore tra 0 e 100
            const clampedValue = Math.max(min, Math.min(max, value));
            
            // Calcolo rotazione: 0% = -90deg, 100% = 90deg
            const degrees = (clampedValue / 100) * 180 - 90;
            
            // Applichiamo i cambiamenti
            needle.style.transform = `rotate(${degrees}deg)`;
            label.innerText = Math.floor(clampedValue);
        }

        /**
         * Genera un valore random e aggiorna il grafico
         */
        function setRandomValue() {
            const randomVal = Math.floor(Math.random() * 101);
            updateGauge(randomVal);
        }

        /**
         * Avvia l'intervallo automatico
         */
        function startAutoUpdate() {
            if (gaugeInterval) return;

            // Avvio ciclo: aggiorna ogni 2 secondi
            gaugeInterval = setInterval(setRandomValue, 2000);
            setRandomValue(); // Esecuzione immediata del primo valore
        }

        // --- INIZIALIZZAZIONE AUTOMATICA ---
        window.onload = () => {
            // Avviamo direttamente l'aggiornamento automatico
            startAutoUpdate();
            
            // Log di debug come nel tuo esempio
            console.log("Gauge avviato correttamente");
        };
    </script>
</body>
</html>
